name: CD Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: "10m"
          script: |
            set -e

            PROJECT_DIR=/opt/mlops
            cd $PROJECT_DIR
            git pull origin main
            source .env
            docker compose -f docker-compose.prod.yml up -d --build serving ui
            
            echo "Ждём запуска serving (до 90 секунд)..."
            for i in $(seq 1 18); do
              sleep 5
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' clearml-serving 2>/dev/null || echo "starting")
              echo "  попытка $i/18: serving health = $STATUS"
              if [ "$STATUS" = "healthy" ]; then
                echo "✅ Serving запущен и здоров"
                break
              fi
              if [ $i -eq 18 ]; then
                echo "⚠️  Serving не стал healthy за 90 секунд"
                echo "--- Логи serving ---"
                docker logs clearml-serving --tail=30
              fi
            done

            echo ""
            echo "=== Итоговый статус контейнеров ==="
            docker compose -f docker-compose.prod.yml ps

            echo ""
            echo "🚀 Деплой завершён"
