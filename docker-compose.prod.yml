name: clearml-prod

services:

  serving:
    build:
      context: .
      dockerfile: Dockerfile.serving
    container_name: clearml-serving
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SERVING_HOST: "0.0.0.0"
      SERVING_PORT: "9000"
    ports:
      - "9000:9000"
    networks:
      - frontend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    container_name: clearml-ui
    restart: unless-stopped
    environment:
      SERVING_URL: "http://serving:9000/serve/news-topic"
    ports:
      - "8501:8501"
    depends_on:
      serving:
        condition: service_healthy
    networks:
      - frontend

networks:
  frontend:
    driver: bridge
