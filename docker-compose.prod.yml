name: clearml-prod

services:

  serving:
    build:
      context: .
      dockerfile: Dockerfile.serving
    container_name: clearml-serving
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SERVING_HOST: "0.0.0.0"
      SERVING_PORT: "9000"
    ports:
      - "9000:9000"
    networks:
      - frontend

  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    container_name: clearml-ui
    restart: unless-stopped
    environment:
      SERVING_URL: "http://serving:9000/serve/news-topic"
    ports:
      - "8501:8501"
    depends_on:
      - serving
    networks:
      - frontend

networks:
  frontend:
    driver: bridge
